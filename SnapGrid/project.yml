name: SnapGrid
options:
  bundleIdPrefix: com.snapgrid
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  SnapGrid:
    type: application
    platform: macOS
    sources:
      - path: SnapGrid
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapgrid.app
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SnapGrid
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 SnapGrid"
        CODE_SIGN_ENTITLEMENTS: SnapGrid/Resources/SnapGrid.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SnapGrid/Resources/SnapGrid.entitlements
