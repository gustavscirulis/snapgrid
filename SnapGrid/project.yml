name: SnapGrid
options:
  bundleIdPrefix: com.snapgrid
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: "HJ4HYUU2Y6"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  SnapGrid:
    type: application
    platform: macOS
    attributes:
      DevelopmentTeam: HJ4HYUU2Y6
      ProvisioningStyle: Automatic
    sources:
      - path: SnapGrid
        excludes:
          - "**/.DS_Store"
    info:
      path: SnapGrid/Resources/Info.plist
      properties:
        CFBundleDisplayName: SnapGrid
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.photography
        NSHumanReadableCopyright: "Copyright © 2026 SnapGrid"
        NSUbiquitousContainers:
          iCloud.com.SnapGrid:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: Any
            NSUbiquitousContainerName: SnapGrid
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapgrid.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 2
        CODE_SIGN_ENTITLEMENTS: SnapGrid/Resources/SnapGrid.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_STANDALONE_ICON_BEHAVIOR: none
    entitlements:
      path: SnapGrid/Resources/SnapGrid.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.SnapGrid
        keychain-access-groups:
          - $(TeamIdentifierPrefix)com.snapgrid.shared

  SnapGridTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SnapGridTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: SnapGrid
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SnapGrid.app/Contents/MacOS/SnapGrid"
        PRODUCT_BUNDLE_IDENTIFIER: com.snapgrid.app.tests
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: "YES"
